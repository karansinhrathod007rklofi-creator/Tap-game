<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rk game 🎮</title><style>
*{box-sizing:border-box;user-select:none}
body{margin:0;font-family:Arial;background:#111827;color:white;text-align:center}
#menu,#game{width:100vw;height:100vh;position:relative;overflow:hidden}
#menu{display:flex;flex-direction:column;justify-content:center;align-items:center;background:linear-gradient(#2563eb,#111827)}
button{padding:15px 30px;margin:10px;font-size:20px;border:0;border-radius:12px;font-weight:bold}
#game{display:none;background:linear-gradient(#1e3a8a,#111827)}
#score{position:absolute;top:20px;left:20px;font-size:24px;font-weight:bold}
#player{position:absolute;bottom:80px;left:50%;width:50px;height:50px;background:#22c55e;border-radius:12px;transform:translateX(-50%)}
#object{position:absolute;width:45px;height:45px;background:#facc15;border-radius:50%}
#controls{position:absolute;bottom:10px;width:100%;display:flex;justify-content:space-around}
.control{background:rgba(255,255,255,.2);color:white;width:100px}
#back{position:absolute;top:15px;right:15px;font-size:14px;padding:8px 12px}
</style></head><body><div id="menu">
<h1>🎮 RK GAME 🎮</h1>
<p>Apna game choose karo 😄</p><button onclick="startCatch()">🎯 Catch The Ball</button>
<button onclick="startDodge()">🚫 Dodge The Blocks</button>

</div><div id="game"><button id="back" onclick="backMenu()">MENU</button>

<div id="score">Score: 0</div><div id="player"></div>
<div id="object"></div><div id="controls">
<button class="control" id="left">⬅️</button>
<button class="control" id="right">➡️</button>
</div></div><script>

let gameType="";
let score=0;
let x=0;
let objectX=0;
let objectY=0;
let speed=5;
let left=false;
let right=false;
let running=false;

const menu=document.getElementById("menu");
const game=document.getElementById("game");
const player=document.getElementById("player");
const object=document.getElementById("object");
const scoreText=document.getElementById("score");

function startCatch(){
gameType="catch";
startGame();
}

function startDodge(){
gameType="dodge";
startGame();
}

function startGame(){

menu.style.display="none";
game.style.display="block";

score=0;
speed=5;
running=true;

x=window.innerWidth/2-25;
player.style.left=x+"px";

newObject();
loop();
}

function newObject(){

objectX=Math.random()*(window.innerWidth-45);
objectY=-60;

object.style.left=objectX+"px";
object.style.top=objectY+"px";

if(gameType==="catch"){
object.style.background="#facc15";
object.style.borderRadius="50%";
}else{
object.style.background="#ef4444";
object.style.borderRadius="5px";
}
}

function loop(){

if(!running)return;

if(left)x-=7;
if(right)x+=7;

if(x<0)x=0;
if(x>window.innerWidth-50)x=window.innerWidth-50;

player.style.left=x+"px";

objectY+=speed;
object.style.top=objectY+"px";

let hit=
objectY+45>window.innerHeight-130 &&
objectX+45>x &&
objectX<x+50;

if(gameType==="catch" && hit){

score++;
speed+=.3;
scoreText.innerText="Score: "+score;
newObject();

}

if(gameType==="dodge" && hit){

gameOver();
return;

}

if(objectY>window.innerHeight){

if(gameType==="catch"){
gameOver();
return;
}

if(gameType==="dodge"){
score++;
scoreText.innerText="Score: "+score;
speed+=.4;
newObject();
}

}

requestAnimationFrame(loop);
}

function gameOver(){

running=false;

alert("GAME OVER! Score: "+score);

backMenu();
}

function backMenu(){

running=false;
game.style.display="none";
menu.style.display="flex";
}

document.getElementById("left").ontouchstart=()=>left=true;
document.getElementById("left").ontouchend=()=>left=false;

document.getElementById("right").ontouchstart=()=>right=true;
document.getElementById("right").ontouchend=()=>right=false;

document.addEventListener("keydown",e=>{
if(e.key==="ArrowLeft")left=true;
if(e.key==="ArrowRight")right=true;
});

document.addEventListener("keyup",e=>{
if(e.key==="ArrowLeft")left=false;
if(e.key==="ArrowRight")right=false;
});

</script></body>
</html>
